components:
  schemas:
    Barcode:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        value:
          type: string
          maxLength: 100
        is_primary:
          type: boolean
      required:
      - id
      - value
    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 120
      required:
      - id
      - name
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name_ar:
          type: string
          maxLength: 120
        name_en:
          type: string
          maxLength: 120
        parent:
          type: string
          format: uuid
          nullable: true
      required:
      - id
      - name_ar
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
          maxLength: 30
        name:
          type: string
          maxLength: 160
        phone:
          type: string
          maxLength: 40
        email:
          type: string
          format: email
          maxLength: 254
        tax_number:
          type: string
          maxLength: 40
        address:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - updated_at
    DashboardSummary:
      type: object
      properties:
        items_count:
          type: integer
        stock_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,4})?$
        low_stock_count:
          type: integer
        movements_today:
          type: integer
      required:
      - items_count
      - low_stock_count
      - movements_today
      - stock_value
    GoodsReceipt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        number:
          type: string
          maxLength: 40
        purchase_order:
          type: string
          format: uuid
        order_number:
          type: string
          readOnly: true
        warehouse:
          type: string
          format: uuid
        warehouse_name:
          type: string
          readOnly: true
        location:
          type: string
          format: uuid
        location_code:
          type: string
          readOnly: true
        notes:
          type: string
        created_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/GoodsReceiptLine'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by
      - id
      - lines
      - location
      - location_code
      - number
      - order_number
      - purchase_order
      - warehouse
      - warehouse_name
    GoodsReceiptLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        order_line:
          type: string
          format: uuid
        item_name:
          type: string
          readOnly: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,3})?$
        unit_cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,4})?$
      required:
      - id
      - item_name
      - order_line
      - quantity
    InventoryReport:
      type: object
      properties:
        items_count:
          type: integer
        balances_count:
          type: integer
        stock_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,4})?$
