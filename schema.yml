      - in: query
        name: location_type
        schema:
          type: string
          enum:
          - AISLE
          - BIN
          - RACK
          - SHELF
        description: |-
          * `AISLE` - ممر
          * `RACK` - رف
          * `SHELF` - طابق
          * `BIN` - خانة
